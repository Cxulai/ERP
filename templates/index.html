<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 企业管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>📊 ERP 系统</h2>
            <p>企业资源管理</p>
        </div>
        <nav class="sidebar-nav">
            <a href="#dashboard" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📈</span> 仪表盘
            </a>
            <a href="#products" class="nav-item" data-page="products">
                <span class="nav-icon">📦</span> 商品管理
            </a>
            <a href="#inventory" class="nav-item" data-page="inventory">
                <span class="nav-icon">🏗️</span> 库存流水
            </a>
            <a href="#customers" class="nav-item" data-page="customers">
                <span class="nav-icon">👥</span> 客户管理
            </a>
            <a href="#suppliers" class="nav-item" data-page="suppliers">
                <span class="nav-icon">🏭</span> 供应商管理
            </a>
            <a href="#sales" class="nav-item" data-page="sales">
                <span class="nav-icon">💰</span> 销售订单
            </a>
            <a href="#purchases" class="nav-item" data-page="purchases">
                <span class="nav-icon">🛒</span> 采购订单
            </a>
            <a href="#reports" class="nav-item" data-page="reports">
                <span class="nav-icon">📋</span> 财务报表
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <h1 id="page-title">仪表盘</h1>
            <div class="top-bar-right">
                <span id="current-time"></span>
            </div>
        </header>
        <div class="content-area" id="content-area">
            <!-- Dynamic content rendered here -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">标题</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Form content -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-submit" onclick="submitModal()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/products.js"></script>
    <script src="/static/js/customers.js"></script>
    <script src="/static/js/suppliers.js"></script>
    <script src="/static/js/sales.js"></script>
    <script src="/static/js/purchases.js"></script>
    <script src="/static/js/reports.js"></script>
</body>
</html>
